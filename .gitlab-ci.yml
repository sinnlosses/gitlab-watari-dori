spec:
  inputs:
    dry_run:
      description: "MR を作成せずログのみ出力する（true のとき MR は作成されません）"
      default: "false"
      type: boolean
    skip_project_ids:
      description: 'MR 作成をスキップするプロジェクト ID（カンマ区切り、例: "123,456"）'
      default: ""
      type: string
---
variables:
  DRY_RUN: $[[ inputs.dry_run ]]
  PNPM_STORE_DIR: .pnpm-store

# ACCESS_TOKEN は GitLab CI/CD Variables で Masked + Protected に設定すること。
# 設定方法: Settings > CI/CD > Variables > ACCESS_TOKEN (Masked: ON, Protected: ON)

.node-setup:
  image: node:22.13-alpine
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - $PNPM_STORE_DIR
  before_script:
    - npm install -g corepack
    - corepack enable
    - corepack prepare pnpm@11.5.1 --activate
    - pnpm config set store-dir $PNPM_STORE_DIR
    - pnpm install --frozen-lockfile

audit:
  extends: .node-setup
  script:
    - pnpm audit --audit-level=high
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: true

check:
  extends: .node-setup
  script:
    - pnpm check
    - pnpm build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

create-merge-requests:
  extends: .node-setup
  script:
    - pnpm check
    - pnpm build
    - pnpm start
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      # SKIP_PROJECT_IDS はスケジュール設定の Variables で指定してください
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      variables:
        SKIP_PROJECT_IDS: $[[ inputs.skip_project_ids ]]
